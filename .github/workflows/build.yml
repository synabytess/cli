name: Build

on:
  pull_request:
    branches:
      - "main"
      - "*/main/*/**"
  push:
    branches:
      - "main"
      - "*/main/*/**"
  release:
    types: [published]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build
        run: go build .

      - name: Format
        run: |
          gofmt -s -l .
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then exit 1; fi

  release:
    permissions:
      id-token: write
      contents: write
      attestations: write
    name: Release
    strategy:
      matrix:
        os: ["linux", "darwin", "windows"]
        arch: ["amd64", "arm64", "386"]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v2')
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Tag
        run: echo "TAG=${GITHUB_REF#refs/*/v}" >> $GITHUB_ENV

      - name: Is Unix Platform
        run: echo "IS_UNIX=${{ matrix.os != 'windows' && matrix.arch != '386' && (matrix.os != 'linux' || matrix.arch != 'arm64') }}" >> $GITHUB_ENV

      - name: Is Windows Platform
        run: echo "IS_WIN=${{ matrix.os == 'windows' }}" >> $GITHUB_ENV

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build
        if: env.IS_UNIX == 'true' || env.IS_WIN == 'true'
        run: |
          go build -ldflags "-X main.version=${{ env.TAG }}" -o "./skidify${{ matrix.os == 'windows' && '.exe' || '' }}"
          chmod +x "./skidify${{ matrix.os == 'windows' && '.exe' || '' }}"
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0

      - name: Upload Artifact for Signing
        if: env.IS_WIN == 'true'
        id: upload-artifact-for-signing
        uses: actions/upload-artifact@v6
        with:
          name: skidify-${{ env.TAG }}-${{ matrix.os }}-${{ (matrix.arch == 'amd64' && 'x64') || (matrix.arch == 'arm64' && 'arm64') || 'x32' }}-unsigned
          path: ./skidify.exe

      - name: Sign Windows Executable
        if: env.IS_WIN == 'true'
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: "cli"
          signing-policy-slug: "release-signing"
          github-artifact-id: ${{ steps.upload-artifact-for-signing.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: "./signed"

      - name: Copy Signed Windows Executable
        if: env.IS_WIN == 'true'
        run: |
          cp ./signed/skidify.exe ./skidify.exe

      - name: Attest output
        uses: actions/attest-build-provenance@v4
        if: env.IS_UNIX == 'true' || env.IS_WIN == 'true'
        with:
          subject-path: "./skidify${{ matrix.os == 'windows' && '.exe' || '' }}"
          subject-name: "skidify v${{ env.TAG }} (${{ matrix.os }}, ${{ (matrix.os == 'windows' && matrix.arch == 'amd64' && 'x64') || (matrix.os == 'windows' && matrix.arch == '386' && 'x32') || matrix.arch }})"

      - name: 7z - .tar
        if: env.IS_UNIX == 'true'
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a -bb0 "skidify-${{ env.TAG }}-${{ matrix.os }}-${{ matrix.arch }}.tar" "./skidify" "./CustomApps" "./Extensions" "./Themes" "./jsHelper" "globals.d.ts" "css-map.json"

      - name: 7z - .tar.gz
        if: env.IS_UNIX == 'true'
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a -bb0 -sdel -mx9 "skidify-${{ env.TAG }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "skidify-${{ env.TAG }}-${{ matrix.os }}-${{ matrix.arch }}.tar"

      - name: 7z - .zip
        if: env.IS_WIN == 'true'
        uses: edgarrc/action-7z@v1
        with:
          args: 7z a -bb0 -mx9 "skidify-${{ env.TAG }}-${{ matrix.os }}-${{ (matrix.arch == 'amd64' && 'x64') || (matrix.arch == 'arm64' && 'arm64') || 'x32' }}.zip" "./skidify.exe" "./CustomApps" "./Extensions" "./Themes" "./jsHelper" "globals.d.ts" "css-map.json"

      - name: Release
        if: env.IS_UNIX == 'true' || env.IS_WIN == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: "skidify-${{ env.TAG }}-${{ matrix.os }}-${{ (matrix.os == 'windows' && matrix.arch == 'amd64' && 'x64') || (matrix.os == 'windows' && matrix.arch == '386' && 'x32') || matrix.arch }}.${{ matrix.os == 'windows' && 'zip' || 'tar.gz' }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-release:
    name: Trigger Homebrew/AUR Release
    runs-on: ubuntu-latest
    needs: release
    if: github.event.release.prerelease == false
    steps:
      - name: Update AUR package
        uses: fjogeleit/http-request-action@master
        with:
          url: https://skidify-update.itsmeow.dev/skidify-update
          method: GET
      - name: Update Winget package
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: skidify.skidify
          installers-regex: '-windows-\w+\.zip$'
          token: ${{ secrets.skidify_WINGET_TOKEN }}
